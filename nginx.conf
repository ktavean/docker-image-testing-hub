worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log warn;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # fisiere temporare in /tmp
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    access_log /tmp/nginx-access.log;

    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # cateva headere de securitate de baza
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"     always;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 8080;
        server_name _;

        root /app/static;
        index index.html;

        # orice ruta necunoscuta cade pe index.html - arhitectura SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            client_max_body_size  2m;
        }

        # trimiterea unui job poate include o arhiva a imaginii construite (max
        # 600 MB) pe langa fisierele Dockerfile/compose; 
        # acopera atat ruta unificata /api/jobs cat si vechea ruta /api/jobs/image
        # prefixul ^~: nu cauta alt match pe ruta odata ce
        # l-a capturat, ca limita mai mica de la /api/ de mai sus sa n-o suprascrie
        location ^~ /api/jobs {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            client_max_body_size  620m;
        }
    }
}